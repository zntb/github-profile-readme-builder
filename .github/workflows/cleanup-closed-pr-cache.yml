name: Cleanup closed pull requests cache

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  pull_request:
    types: [closed]

jobs:
  cleanup-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Cleanup closed PR caches
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get all closed pull requests
            const closedPRs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'closed',
              per_page: 100
            });

            console.log(`Found ${closedPRs.data.length} closed pull requests`);

            // Get all caches with pagination
            let allCaches = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const caches = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page: page
              });

              allCaches = allCaches.concat(caches.data.actions_caches);

              if (caches.data.actions_caches.length < 100) {
                hasMore = false;
              } else {
                page++;
              }
            }

            console.log(`Found ${allCaches.length} total cache entries`);

            // Find and delete caches related to closed PRs
            const prNumbers = closedPRs.data.map(pr => pr.number);
            let deletedCount = 0;

            for (const cache of allCaches) {
              const cacheKey = cache.key;
              const isPRCache = prNumbers.some(prNum =>
                cacheKey.includes(`pr-${prNum}`) ||
                cacheKey.includes(`pull/${prNum}`) ||
                cacheKey.includes(`refs/pull/${prNum}`)
              );

              if (isPRCache) {
                console.log(`Deleting cache: ${cacheKey} (id: ${cache.id})`);
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id
                });
                deletedCount++;
              }
            }

            console.log(`Deleted ${deletedCount} cache entries related to closed PRs`);
