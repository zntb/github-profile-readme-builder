name: Deploy Prep

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  prep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Run linter
        run: npm run lint

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Run format check
        run: npm run format:check

      - name: Build application
        run: npm run build

      - name: Run pre-deployment Python script
        run: python deploy-prep.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-prep-artifacts
          path: |
            .next
            .vercel
          retention-days: 7
